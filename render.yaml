# Render Blueprint — Django backend + Postgres + 3DVista tour static hosting.
# Deploy: push this repo to GitHub, then in Render: New > Blueprint > pick the repo.
# After the first deploy, set DJANGO_ALLOWED_HOSTS / CORS_ALLOWED_ORIGINS /
# CSRF_TRUSTED_ORIGINS to the real URLs (see DEPLOY.md).

databases:
  - name: tourportal-db
    plan: free
    databaseName: tourportal
    user: tourportal

services:
  - type: web
    name: tourportal-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: >-
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate &&
      python manage.py ensure_superuser
    startCommand: gunicorn config.wsgi:application
    healthCheckPath: /admin/login/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromDatabase:
          name: tourportal-db
          property: connectionString
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: INGEST_TOKEN
        generateValue: true
      # --- Set these AFTER the first deploy, once you know the URLs ---
      - key: DJANGO_ALLOWED_HOSTS
        sync: false          # e.g. tourportal-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false          # e.g. https://your-app.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        sync: false          # e.g. https://tourportal-backend.onrender.com
      - key: DEMO_TOUR_URL
        sync: false          # e.g. https://tourportal-backend.onrender.com/acme-elearning/index.htm
      # --- Superuser bootstrap (set a strong password) ---
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false          # set a strong secret in the dashboard
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@example.com
