# Render Blueprint — Django backend + 3DVista tour (estático).
# La base de datos NO va aquí: Render ya no crea Postgres gratis vía Blueprint.
# Usa un Postgres gratis de Neon (https://neon.tech) y pega su cadena en
# DATABASE_URL (variable sync:false). Ver DEPLOY.md, Paso 1.
#
# Deploy: Render ► New ► Blueprint ► selecciona el repo Yopukka/3dVista.

services:
  - type: web
    name: tourportal-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py ensure_superuser"
    startCommand: "gunicorn config.wsgi:application"
    healthCheckPath: /admin/login/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: INGEST_TOKEN
        generateValue: true
      # --- Pega aquí la cadena de conexión de tu Postgres gratis de Neon ---
      - key: DATABASE_URL
        sync: false          # postgresql://...neon.tech/...?sslmode=require
      # --- Ajusta tras el primer deploy, cuando sepas las URLs ---
      - key: DJANGO_ALLOWED_HOSTS
        sync: false          # p.ej. tourportal-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false          # p.ej. https://tu-app.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        sync: false          # p.ej. https://tourportal-backend.onrender.com
      - key: DEMO_TOUR_URL
        sync: false          # p.ej. https://tourportal-backend.onrender.com/acme-elearning/index.htm
      # --- Bootstrap del superusuario (pon una contraseña fuerte) ---
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false          # contraseña fuerte → login del portal
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@example.com
